info:
  name: Update Specific Folder
  type: http
  seq: 4

http:
  method: PUT
  url: http://localhost:8080/folder/43fe2483-8298-4aa4-abb3-a4b337e264cc
  headers:
    - name: Authorization
      value: Bearer {{AUTH_TOKEN}}
  body:
    type: json
    data: |-
      {
        "folderName": "New Folder name"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
