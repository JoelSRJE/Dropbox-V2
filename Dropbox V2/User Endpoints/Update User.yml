info:
  name: Update User
  type: http
  seq: 1

http:
  method: PUT
  url: http://localhost:8080/user
  headers:
    - name: Authorization
      value: Bearer {{AUTH_TOKEN}}
  body:
    type: json
    data: |-
      {
        "username": "JoelSRJE"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
